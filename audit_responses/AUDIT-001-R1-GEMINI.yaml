audit_id: AUDIT-001
round: 1
auditor: gemini
timestamp: 2026-06-22

questions:
  - id: Q1
    topic: "Unified Memory"
    text: "Как NEVA обходит проблему разделяемой памяти на M1 (максимум 16GB)? Каков объём статического веса моделей в RAM и сколько остаётся на динамический контекст (KV-cache)?"

  - id: Q2
    topic: "Execution Backends"
    text: "Используется ли Apple Neural Engine (ANE), или оркестратор полностью утилизирует GPU (Metal Performance Shaders) и CPU (через llama.cpp / MLX)?"

  - id: Q3
    topic: "SSD деградация"
    text: "Как система ведёт себя при переполнении RAM? Мониторится ли износ SSD из-за агрессивного свопинга при переключении контекстов между агентами?"

  - id: Q4
    topic: "Routing Overhead"
    text: "Сколько времени (и токенов) NEVA тратит на маршрутизацию запроса между подсистемами по отношению к полезной генерации?"

  - id: Q5
    topic: "Loop Detection"
    text: "Как реализован предохранитель на случай если агенты NEVA начнут бесконечно вызывать друг друга, выжигая ресурсы M1?"

  - id: Q6
    topic: "Консистентность памяти"
    text: "Как синхронизируется состояние (State) между изолированными инстансами моделей/агентов в условиях ограниченного ресурса памяти?"

  - id: Q7
    topic: "Data Leakage"
    text: "Гарантированно ли NEVA удерживает все промежуточные логи и данные оркестрации внутри локального контура Mac M1? Нет ли скрытых fallback-запросов к внешним API при нехватке локальной мощности?"

  - id: Q8
    topic: "Prompt Injection"
    text: "Насколько оркестратор защищён от перехвата управления через системные промпты, если один из агентов получает на вход недоверенный текст извне?"
