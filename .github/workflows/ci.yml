name: NEVA CI

on:
  push:
    branches: [ main, dev, "task/*" ]
  pull_request:
    branches: [ main, dev ]

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Python setup
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt --break-system-packages 2>/dev/null || pip install -r requirements.txt

      - name: Ruff lint
        run: ruff check src/ || true

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

      - name: Self-test
        run: python neva_self_diagnostics.py --self-test || echo "self-test не найден"

  reindex-and-notify:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Reindex memory
        run: |
          ./scripts/index.sh || echo "REINDEX_NEEDED" > memory/REINDEX_NEEDED.flag

      - name: Notify Director
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          MSG="✅ NEVA main: коммит ${{ github.sha }} | ${{ github.event.head_commit.message }}"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=${MSG}" || echo "Telegram недоступен"

  cleanup-branches:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Warn about stale task branches
        run: |
          git fetch --all
          STALE=$(git branch -r --merged origin/main | grep "task/" | sed 's/origin\///')
          if [ -n "$STALE" ]; then
            echo "⚠️ Следующие ветки слиты в main но не удалены:"
            echo "$STALE"
          fi
